<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GevArtPlay | 3D Выставка</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @layer reset, tokens, base, layout, cube, ui, cards, reveal, theme, responsive;

        @layer reset { *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } }

        @layer tokens {
          :root {
            color-scheme: dark;
            --dark-bg: #1c1814;
            --dark-fg: #ede8df;
            --dark-muted: #8a7b6e;
            --light-bg: #f0ece3;
            --light-fg: #0d0d14;
            --light-muted: #9a9aaa;
            --accent-dark: #d4a84b; 
            
            --bg: var(--dark-bg);
            --fg: var(--dark-fg);
            --muted: var(--dark-muted);
            --accent: var(--accent-dark);

            --font-display: "Bebas Neue", sans-serif;
            --font-mono: "DM Mono", monospace;
            --hairline: 0.0625rem;
            --ui-inset: 2rem;
            --card-bg: rgba(28, 24, 20, 0.82);
            --card-border: rgba(212, 168, 75, 0.2);
            --nav-x: calc(var(--ui-inset) + 0.125rem);
            --reveal-offset: 0.625rem;
            --reveal-duration: 0.5s;
            --z-ui: 10;
          }
        }

        @layer base {
          html { color-scheme: dark; overscroll-behavior: none; }
          body { background: var(--bg); color: var(--fg); font-family: var(--font-mono); overflow-x: hidden; transition: background 0.3s ease; user-select: none; }
          ::-webkit-scrollbar { width: 6px; }
          ::-webkit-scrollbar-track { background: var(--bg); }
          ::-webkit-scrollbar-thumb { background: var(--accent); }
        }

        @layer layout {
          #scene { position: fixed; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center; perspective: 1100px; pointer-events: none; }
          #scroll_container { position: relative; z-index: 2; }
          section { min-height: 100vh; display: flex; align-items: center; padding: 6rem calc(5rem + var(--ui-inset)) 6rem 5rem; pointer-events: none; }
          #drag_zone { position: fixed; inset: 0; z-index: 5; cursor: grab; touch-action: none; }
          #drag_zone:active { cursor: grabbing; }
        }

        @layer cube {
          #cube { 
              --s: min(74vw, 74vh, 560px); width: var(--s); height: var(--s); 
              position: relative; transform-style: preserve-3d; transform: rotateX(90deg) rotateY(0deg); 
              will-change: transform; transition: transform 0.1s linear; 
          }
          
          .face { 
              position: absolute; inset: 0; backface-visibility: hidden; 
              background: #14100d;
              display: flex; align-items: center; justify-content: center;
              border: 1px solid rgba(255,255,255,0.05);
          }
          
          /* ФОТОГРАФИИ С РАМКАМИ */
          .picture-frame {
              width: 75%; height: 75%;
              background: #fdfdfd; padding: 3%; 
              border: 6px solid #2b1d14; border-radius: 2px;
              box-shadow: 20px 30px 40px rgba(0,0,0,0.9), inset 0 0 10px rgba(0,0,0,0.2); 
              display: flex; align-items: center; justify-content: center;
          }
          .picture-frame img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); pointer-events: none;}

          .face[data-face="front"] { transform: translateZ(calc(var(--s) / 2)); }
          .face[data-face="back"] { transform: rotateY(180deg) translateZ(calc(var(--s) / 2)); }
          .face[data-face="right"] { transform: rotateY(90deg) translateZ(calc(var(--s) / 2)); }
          .face[data-face="left"] { transform: rotateY(-90deg) translateZ(calc(var(--s) / 2)); }
          .face[data-face="top"] { transform: rotateX(-90deg) translateZ(calc(var(--s) / 2)); }
          .face[data-face="bottom"] { transform: rotateX(90deg) translateZ(calc(var(--s) / 2)); }
        }

        @layer ui {
          #loading_screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; color: var(--accent); font-family: var(--font-display); font-size: 2rem; letter-spacing: 5px; transition: opacity 0.5s ease; pointer-events: none;}

          #hud { position: fixed; top: var(--ui-inset); right: var(--ui-inset); z-index: var(--z-ui); text-align: right; font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; pointer-events: none;}
          .progress-bar { width: 7.5rem; height: var(--hairline); background: var(--muted); margin-block-start: 0.5rem; margin-inline-start: auto; position: relative; overflow: hidden; }
          .progress-fill { position: absolute; inset-block: 0; inset-inline-start: 0; width: 0%; background: var(--accent); transition: width 0.1s linear; }
          
          #face_caption { position: fixed; bottom: var(--ui-inset); left: 50%; translate: -50% 0; z-index: var(--z-ui); text-align: center; pointer-events: none; }
          #face_caption_num { font-size: 0.58rem; letter-spacing: 0.28em; color: var(--accent); text-transform: uppercase; margin-block-end: 0.15rem; }
          #face_caption_name { font-family: var(--font-display); font-size: clamp(1.8rem, 5vw, 3.5rem); letter-spacing: 0.08em; color: var(--muted); opacity: 0.5; line-height: 1; text-transform: uppercase;}
          
          #back_btn { position: fixed; top: 2rem; left: var(--nav-x); z-index: 100; color: var(--muted); text-decoration: none; font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; border: var(--hairline) solid color-mix(in srgb, var(--muted) 45%, transparent); padding: 0.6rem 1.25rem; transition: 0.3s; border-radius: 0;}
          #back_btn:hover { color: var(--fg); border-color: var(--muted); background: color-mix(in srgb, var(--muted) 12%, transparent); }

          /* КНОПКИ ВПЕРЕД / НАЗАД */
          .nav-arrow {
              position: fixed; top: 50%; transform: translateY(-50%); z-index: 100;
              background: transparent; color: var(--muted); border: var(--hairline) solid color-mix(in srgb, var(--muted) 45%, transparent);
              width: 40px; height: 40px; font-size: 16px; border-radius: 0; /* Квадратные */
              cursor: pointer; display: flex; align-items: center; justify-content: center;
              transition: 0.3s; backdrop-filter: blur(5px); outline: none;
          }
          .nav-arrow:hover { background: color-mix(in srgb, var(--muted) 12%, transparent); color: var(--fg); border-color: var(--muted); }
          #btn_prev { left: var(--nav-x); } 
          #btn_next { right: var(--nav-x); }

          /* КНОПКИ АДМИНА (КВАДРАТНЫЕ С ТОНКОЙ ОБВОДКОЙ) */
          .admin-btn {
              display: none; position: fixed; top: 2rem; z-index: 100;
              color: var(--muted); border: var(--hairline) solid color-mix(in srgb, var(--muted) 45%, transparent); background: transparent;
              padding: 0.6rem 1.25rem; font-family: var(--font-mono); font-size: 0.62rem; 
              letter-spacing: 0.18em; cursor: pointer; transition: 0.3s; text-transform: uppercase; border-radius: 0;
          }
          .admin-btn:hover { color: var(--fg); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 15%, transparent); }
          #edit-btn { left: 160px; } 
          #save-btn { left: 160px; border-color: rgba(255, 68, 68, 0.5); color: #ff4444; }
          #save-btn:hover { background: rgba(255, 68, 68, 0.1); border-color: #ff4444; color: #ff4444;}
        }

        @layer cards {
          /* ВАШ ОРИГИНАЛЬНЫЙ ДИЗАЙН КАРТОЧЕК 100% */
          .text-card {
            max-width: 23.75rem; 
            padding: 2.25rem 2rem;
            background: var(--card-bg);
            border-left: var(--hairline) solid var(--card-border);
            backdrop-filter: blur(6px) saturate(120%);
            -webkit-backdrop-filter: blur(6px) saturate(120%);
            transition: background 0.3s ease, border-color 0.3s ease;
            pointer-events: auto; 
          }

          .text-card.right {
            margin-inline-start: auto;
            border-left: none;
            border-right: var(--hairline) solid var(--card-border);
            text-align: right;
          }
          .text-card.right .h-line { transform-origin: right; margin-inline-start: auto; }

          .tag { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-block-end: 1.1rem; outline: none;}
          :where(h1, h2) { font-family: var(--font-display); font-weight: 400; letter-spacing: 0.03em; line-height: 0.92; outline: none; text-transform: uppercase;}
          h1 { font-size: clamp(3rem, 8vw, 6.5rem); }
          h2 { font-size: clamp(2.2rem, 5vw, 4rem); }
          
          .body-text { font-size: 0.78rem; line-height: 1.8; color: color-mix(in srgb, var(--fg) 55%, transparent); margin-block-start: 1.25rem; outline: none;}
          .h-line { width: 3.125rem; height: var(--hairline); background: var(--accent); margin-block-end: 1.2rem; transform-origin: left; }
          
          .author { display: block; margin-top: 15px; font-weight: bold; color: var(--accent); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; outline: none;}

          .editable-active { border: 1px dashed var(--accent); padding: 5px; background: rgba(255,255,255,0.05); }
        }

        @layer reveal {
          :is(.tag, h1, h2, .body-text, .author) { opacity: 0; translate: 0 var(--reveal-offset); }
          :is(h1, h2) { translate: 0 1.125rem; transition: opacity var(--reveal-duration) ease 0.08s, translate var(--reveal-duration) ease 0.08s; }
          .tag { transition: opacity var(--reveal-duration) ease, translate var(--reveal-duration) ease; }
          .body-text, .author { transition: opacity var(--reveal-duration) ease 0.2s, translate var(--reveal-duration) ease 0.2s; }
          .h-line { opacity: 0; scale: 0 1; transition: opacity 0.4s ease, scale 0.4s ease; }
          
          :is(.tag, h1, h2, .body-text, .author).visible { opacity: 1; translate: 0 0; }
          .h-line.visible { opacity: 1; scale: 1 1; }
        }

        @media (max-width: 1024px) {
            #cube { --s: min(80vw, 80vh, 400px); }
            section { align-items: flex-end; padding: 0 1.5rem 3.5rem; min-height: 150vh;}
            #s0 { min-height: 100vh; align-items: center; padding: 4rem 1.5rem; }
            .text-card, .text-card.right { max-width: 100%; padding: 1.5rem 1.25rem; }
            .nav-arrow { display: none; } 
            #hud { top: 1rem; right: 1rem; }
            #back_btn { top: 1rem; left: 1rem; }
            .admin-btn { left: 110px !important; top: 1rem !important;}
        }
    </style>
</head>
<body>

    <div id="loading_screen">СОЗДАНИЕ ГАЛЕРЕИ...</div>
    <div id="drag_zone"></div>

    <a href="index.html" id="back_btn">← НА ГЛАВНУЮ</a>
    <button id="edit-btn" class="admin-btn" onclick="startEditing()">✏️ EDIT</button>
    <button id="save-btn" class="admin-btn" onclick="saveExhibition()">💾 SAVE</button>

    <button class="nav-arrow" id="btn_prev">❮</button>
    <button class="nav-arrow" id="btn_next">❯</button>

    <div id="scene">
        <div id="cube">
            <!-- Физические грани куба -->
            <div class="face" data-face="top"></div>
            <div class="face" data-face="front"></div>
            <div class="face" data-face="right"></div>
            <div class="face" data-face="back"></div>
            <div class="face" data-face="left"></div>
            <div class="face" data-face="bottom"></div>
        </div>
    </div>

    <div id="hud">
        <div id="hud_pct">000%</div>
        <div class="progress-bar"><div class="progress-fill" id="prog_fill"></div></div>
    </div>

    <div id="face_caption">
        <div id="face_caption_num">01</div>
        <div id="face_caption_name">ВВЕДЕНИЕ</div>
    </div>

    <div id="scroll_container"></div>

    <script>
        const USERNAME = 'gevartplay';
        const REPO = 'gevartplay.github.io';
        const DATA_FILE = 'exhibition_data.json';
        
        let portfolioImages = [];
        let customData = { intro: {}, photos: {} };
        let customDataSha = null;
        let isEditMode = false;

        const TITLES = [
            "ЭКСПРЕССИЯ", "ЭМОЦИЯ", "МГНОВЕНИЕ", "ВЕЧНОСТЬ", "ГЛУБИНА", 
            "РАКУРС", "ОТРАЖЕНИЕ", "АТМОСФЕРА", "ИЛЛЮЗИЯ", 
            "МОМЕНТ", "СИЛУЭТ", "ФРАГМЕНТ", "ВДОХНОВЕНИЕ"
        ];

        const QUOTES = [
            { text: "«Фотография — это секрет о секрете. Чем больше она говорит вам, тем меньше вы знаете.»", author: "Диана Арбус" },
            { text: "«Искусство — это ложь, которая делает нас способными осознать правду.»", author: "Пабло Пикассо" },
            { text: "«То, что вы ловите на пленку, запечатлевается навсегда. Она помнит мелочи.»", author: "Аарон Сискинд" },
            { text: "«Свет прославляет всё. Он превращает мусор в золото.»", author: "Уинстон Линк" },
            { text: "«Мы видим не вещи, а то, как на них падает свет.»", author: "Карл Юнг" },
            { text: "«Фотография берет фрагмент факта и дает ему жизнь.»", author: "Марио Джакомелли" },
            { text: "«Каждая фотография — это сертификат присутствия.»", author: "Ролан Барт" },
            { text: "«Форма — это тайна, раскрывающаяся через свет.»", author: "Огюст Роден" }
        ];

        const dom = {
            cube: document.getElementById("cube"),
            scrollEl: document.getElementById("scroll_container"),
            hudPct: document.getElementById("hud_pct"),
            progFill: document.getElementById("prog_fill"),
            sceneName: document.getElementById("scene_name"),
            captionNum: document.getElementById("face_caption_num"),
            captionName: document.getElementById("face_caption_name"),
            loading: document.getElementById("loading_screen")
        };

        let STOPS = [];
        let sectionTops = [];
        let maxScroll = 1;
        let smoothScroll = 0;
        let targetScroll = 0;

        async function initApp() {
            const token = localStorage.getItem('github_token_gevartplay');
            if (token) document.getElementById('edit-btn').style.display = 'block';

            // 1. Загрузка текстов админа
            try {
                const resData = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${DATA_FILE}?t=${Date.now()}`);
                if(resData.ok) {
                    const dataJson = await resData.json();
                    customDataSha = dataJson.sha;
                    customData = JSON.parse(decodeURIComponent(escape(atob(dataJson.content))));
                    if(!customData.photos) customData.photos = {};
                }
            } catch(e) {}

            // 2. Загрузка фото + Случайный порядок (Fisher-Yates)
            try {
                const resImg = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/images?t=${Date.now()}`);
                if (!resImg.ok) throw new Error("API Limit");
                const files = await resImg.json();
                
                let tempImages = files.filter(f => f.name.match(/\.(jpg|jpeg|png)$/i) && !f.name.includes('logo.png') && !f.name.includes('avatar.jpg') && !f.name.includes('ikon.png'));
                
                for (let i = tempImages.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [tempImages[i], tempImages[j]] = [tempImages[j], tempImages[i]];
                }
                portfolioImages = tempImages;
            } catch (e) { 
                console.error("Ошибка загрузки фото", e); 
                portfolioImages = [
                    { download_url: "images/imgi_3_964ff10fab66bfd241a5c7ce2452d701.jpg", sha: "demo1" },
                    { download_url: "images/imgi_5_1362ba95d769a188f22cec6d95d52685.jpg", sha: "demo2" },
                    { download_url: "images/imgi_9_d2b9af8f4167ac9c9c065d864be3ab83.jpg", sha: "demo3" }
                ];
            }

            if(portfolioImages.length === 0) {
                dom.scrollEl.innerHTML = `<section style="justify-content:center"><h1 style="color:white; text-align:center;">ГАЛЕРЕЯ ПУСТА</h1></section>`;
                dom.loading.style.display = 'none';
                return;
            }

            // 3. Создаем идеальный хаотичный путь, который циклично обходит все 6 граней без переворотов
            STOPS = buildSafeChaoticStops(portfolioImages.length);
            
            buildSections();
            
            dom.loading.style.opacity = '0';
            setTimeout(() => dom.loading.style.display = 'none', 500);
        }

        // --- БЕЗОПАСНАЯ МАТЕМАТИКА ВРАЩЕНИЯ ---
        // Идеально обходит 6 граней по кругу (с заворотом на крышу и пол), 
        // гарантируя что фото никогда не перезапишут друг друга и не перевернутся.
        function buildSafeChaoticStops(n) {
            const pattern = [
                { rx: 90, ry: 0, face: 'top' },
                { rx: 0, ry: 0, face: 'front' },
                { rx: 0, ry: -90, face: 'right' },
                { rx: 0, ry: -180, face: 'back' },
                { rx: 0, ry: -270, face: 'left' },
                { rx: -90, ry: -360, face: 'bottom' }
            ];
            
            let stops = [];
            for (let i = 0; i < n; i++) {
                let cycle = Math.floor(i / 6); // Каждый 6-й шаг добавляем оборот -360, чтобы крутилось вечно
                let p = pattern[i % 6];
                stops.push({ rx: p.rx, ry: p.ry - (cycle * 360), face: p.face });
            }
            return stops;
        }

        function buildSections() {
            const introTitle = customData.intro?.title || "ИСКУССТВО<br>ВИДЕТЬ";
            const introText = customData.intro?.text || "Добро пожаловать в виртуальный выставочный зал. Каждая фотография здесь — это застывшая мысль.";

            let html = `
            <section id="s0">
                <div class="text-card">
                    <div class="h-line"></div>
                    <div class="tag">GevArtPlay 3D Галерея</div>
                    <h1 id="text-intro-title">${introTitle}</h1>
                    <p class="body-text" id="text-intro-desc">${introText}</p>
                </div>
            </section>`;

            for(let i = 1; i < portfolioImages.length; i++) {
                const img = portfolioImages[i];
                const saved = customData.photos[img.sha] || {};
                
                const tWord = saved.title || TITLES[i % TITLES.length];
                const qText = saved.quote || QUOTES[i % QUOTES.length].text;
                const qAuthor = saved.author || QUOTES[i % QUOTES.length].author;
                
                const alignmentClass = (i % 2 !== 0) ? 'right' : ''; 
                html += `
                <section id="s${i}">
                    <div class="text-card ${alignmentClass}">
                        <div class="h-line"></div>
                        <div class="tag">ЭКСПОНАТ ${String(i).padStart(2, '0')}</div>
                        <h2 id="title-${img.sha}">${tWord}</h2>
                        <p class="body-text" id="quote-${img.sha}">${qText}</p>
                        <span class="author">— <span id="author-${img.sha}">${qAuthor}</span></span>
                    </div>
                </section>`;
            }

            dom.scrollEl.innerHTML = html;
            
            const revealEls = document.querySelectorAll(".tag, h1, h2, .body-text, .author, .h-line");
            const io = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible"); });
            }, { threshold: 0.2 });
            revealEls.forEach(el => io.observe(el));

            setTimeout(() => { recalcScroll(); init3DScroll(); }, 500);
        }

        // --- ВЕШАЕМ ФОТО С РАМКОЙ ---
        function updateFaceImage(stopIndex) {
            if (stopIndex < 0 || stopIndex >= portfolioImages.length) return;
            const stop = STOPS[stopIndex];
            const src = portfolioImages[stopIndex].download_url;
            
            const faceElem = document.querySelector(`.face[data-face="${stop.face}"]`);
            if(!faceElem) return;

            // Всегда перерисовываем картинку с рамкой, чтобы избежать багов кэша DOM
            faceElem.innerHTML = `
                <div class="picture-frame">
                    <img src="${src}" alt="Gallery Image">
                </div>
            `;
        }

        function recalcScroll() {
            maxScroll = Math.max(1, document.documentElement.scrollHeight - innerHeight);
            const sections = document.querySelectorAll("section");
            sectionTops = Array.from(sections).map(s => s.getBoundingClientRect().top + window.scrollY);
        }
        window.addEventListener("resize", recalcScroll);

        function scrollToSection(index) {
            if(index < 0 || index >= portfolioImages.length) return;
            window.scrollTo({ top: sectionTops[index], behavior: 'smooth' });
        }
        
        // --- УПРАВЛЕНИЕ: КНОПКИ, СВАЙП, ДРАГ ---
        document.getElementById('btn_prev').addEventListener('click', () => {
            let currentIdx = Math.round(smoothScroll * (portfolioImages.length - 1));
            scrollToSection(currentIdx - 1);
        });
        document.getElementById('btn_next').addEventListener('click', () => {
            let currentIdx = Math.round(smoothScroll * (portfolioImages.length - 1));
            scrollToSection(currentIdx + 1);
        });

        let startX = 0, startY = 0;
        function handleStart(e) {
            if(isEditMode) return;
            startX = e.touches ? e.touches[0].clientX : e.clientX;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
        }
        function handleMove(e) {
            if(isEditMode || startX === 0) return;
            let x = e.touches ? e.touches[0].clientX : e.clientX;
            let y = e.touches ? e.touches[0].clientY : e.clientY;
            let dx = x - startX; let dy = y - startY;
            
            // Свайп/перетаскивание влево или вправо
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
                let currentIdx = Math.round(smoothScroll * (portfolioImages.length - 1));
                if (dx < 0) scrollToSection(currentIdx + 1); // Свайп влево -> вперед
                else scrollToSection(currentIdx - 1);        // Свайп вправо -> назад
                startX = 0; 
            }
        }
        function handleEnd() { startX = 0; }

        const dragZone = document.getElementById('drag_zone');
        dragZone.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        dragZone.addEventListener('touchstart', handleStart, {passive: true});
        window.addEventListener('touchmove', handleMove, {passive: true});
        window.addEventListener('touchend', handleEnd);

        // --- ПЛАВНАЯ АНИМАЦИЯ И РЕНДЕР КУБА ---
        const easeIO = (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t);
        let currentActiveIndex = -1;
        
        function init3DScroll() {
            window.addEventListener("scroll", () => { targetScroll = scrollY / maxScroll; }, { passive: true });

            const frame = () => {
                requestAnimationFrame(frame);
                smoothScroll += (targetScroll - smoothScroll) * 0.08;
                
                const p = Math.round(smoothScroll * 100);
                dom.hudPct.textContent = String(p).padStart(3, "0") + "%";
                dom.progFill.style.width = `${p}%`;

                const N = portfolioImages.length;
                if(N < 2) return;

                const t = smoothScroll * (N - 1);
                const i = Math.min(Math.floor(t), N - 2);
                const f = easeIO(t - i); 
                
                const a = STOPS[i];
                const b = STOPS[i + 1];
                
                // Вращение
                const rx = a.rx + (b.rx - a.rx) * f;
                const ry = a.ry + (b.ry - a.ry) * f;
                dom.cube.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;

                // Подмена фотографий на невидимых гранях
                let activeIndex = Math.round(t);
                if (activeIndex !== currentActiveIndex) {
                    currentActiveIndex = activeIndex;
                    
                    const title = activeIndex === 0 ? "ВВЕДЕНИЕ" : document.getElementById(`title-${portfolioImages[activeIndex].sha}`)?.innerText || TITLES[activeIndex % TITLES.length];
                    dom.sceneName.textContent = title;
                    dom.captionNum.textContent = String(activeIndex + 1).padStart(2, "0");
                    dom.captionName.textContent = title;
                    
                    // Гарантированно вешаем фото на текущую и соседние грани
                    updateFaceImage(activeIndex);
                    if(activeIndex + 1 < N) updateFaceImage(activeIndex + 1);
                    if(activeIndex - 1 >= 0) updateFaceImage(activeIndex - 1);
                }
            };
            requestAnimationFrame(frame);
        }

        // --- АДМИН ПАНЕЛЬ ---
        function startEditing() {
            isEditMode = true;
            document.getElementById('edit-btn').style.display = 'none';
            document.getElementById('save-btn').style.display = 'block';
            document.getElementById('drag_zone').style.display = 'none'; // Чтобы можно было выделять текст
            
            document.querySelectorAll('h1, h2, .body-text, .author span').forEach(el => {
                el.contentEditable = "true";
                el.classList.add('editable-active');
            });
        }

        async function saveExhibition() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "СОХРАНЕНИЕ...";

            let newData = { intro: {}, photos: {} };
            newData.intro.title = document.getElementById('text-intro-title')?.innerHTML || "";
            newData.intro.text = document.getElementById('text-intro-desc')?.innerHTML || "";

            portfolioImages.forEach((img, i) => {
                if (i === 0) return; // Пропускаем интро
                const sha = img.sha;
                const titleEl = document.getElementById(`title-${sha}`);
                if (titleEl) {
                    newData.photos[sha] = {
                        title: titleEl.innerHTML,
                        quote: document.getElementById(`quote-${sha}`).innerHTML,
                        author: document.getElementById(`author-${sha}`).innerHTML
                    };
                }
            });

            const token = localStorage.getItem('github_token_gevartplay');
            const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(newData))));
            
            try {
                const body = { message: "Update 3D exhibition texts", content: contentBase64 };
                if (customDataSha) body.sha = customDataSha;
                
                const res = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${DATA_FILE}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                if (res.ok) {
                    const ans = await res.json(); customDataSha = ans.content.sha;
                    btn.innerText = "✅ СОХРАНЕНО!"; 
                    setTimeout(() => location.reload(), 1000);
                } else { btn.innerText = "ОШИБКА"; }
            } catch(e) { alert("Ошибка: " + e); }
        }

        initApp();
    </script>
</body>
