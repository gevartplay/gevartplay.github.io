<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GevArtPlay | 3D Выставка</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @layer reset, tokens, base, layout, cube, ui, cards, reveal, theme, responsive;

        @layer reset { *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } }

        @layer tokens {
          :root {
            color-scheme: dark;
            --dark-bg: #0a0807; /* Глубокий темный фон */
            --dark-fg: #ede8df;
            --dark-muted: #8a7b6e;
            --light-bg: #f0ece3;
            --light-fg: #0d0d14;
            --light-muted: #9a9aaa;
            --accent-dark: #5b51d8; /* Ваш фирменный цвет */
            
            --bg: var(--dark-bg);
            --fg: var(--dark-fg);
            --muted: var(--dark-muted);
            --accent: var(--accent-dark);

            --font-display: "Bebas Neue", sans-serif;
            --font-mono: "DM Mono", monospace;
            --hairline: 0.0625rem;
            --ui-inset: 2rem;
            --card-bg: rgba(28, 24, 20, 0.82); /* Оригинальный цвет карточек */
            --card-border: rgba(91, 81, 216, 0.5);
            --nav-x: calc(var(--ui-inset) + 0.125rem);
            --reveal-offset: 0.625rem;
            --reveal-duration: 0.5s;
            --z-ui: 10;
          }
        }

        @layer base {
          html { color-scheme: dark; }
          body { background: var(--bg); color: var(--fg); font-family: var(--font-mono); overflow-x: hidden; transition: background 0.3s ease, color 0.3s ease; }
          ::-webkit-scrollbar { width: 6px; }
          ::-webkit-scrollbar-track { background: var(--bg); }
          ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        }

        @layer layout {
          /* Подсветка позади куба */
          #ambient_glow {
              position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
              width: 50vw; height: 50vw; border-radius: 50%;
              background: radial-gradient(circle, rgba(91, 81, 216, 0.2) 0%, transparent 70%);
              filter: blur(50px); z-index: 0; pointer-events: none;
              animation: pulseGlow 6s infinite alternate ease-in-out;
          }
          @keyframes pulseGlow { 0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; } 100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } }

          #scene { position: fixed; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center; perspective: 1100px; pointer-events: none; }
          #scroll_container { position: relative; z-index: 2; }
          section { min-height: 100vh; display: flex; align-items: center; padding: 6rem calc(5rem + var(--ui-inset)) 6rem 5rem; pointer-events: none;}
        }

        @layer cube {
          #cube { --s: min(60vw, 60vh, 560px); width: var(--s); height: var(--s); position: relative; transform-style: preserve-3d; transform: rotateX(90deg) rotateY(0deg); will-change: transform; transition: transform 0.1s linear;}
          
          /* === ТЕКСТУРА СТЕНЫ (Ржавый металл) === */
          .face { 
              position: absolute; inset: 0; backface-visibility: hidden; 
              background-color: #1a1614;
              background-image: 
                  radial-gradient(circle at 20% 30%, rgba(139, 69, 19, 0.3) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(205, 92, 92, 0.15) 0%, transparent 40%),
                  repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 4px),
                  linear-gradient(135deg, rgba(20, 15, 12, 0.9) 0%, rgba(5, 4, 3, 0.95) 100%);
              border: 1px solid #332822; 
              box-shadow: inset 0 0 120px rgba(0,0,0,1); 
              display: flex; align-items: center; justify-content: center;
          }
          
          /* === ДЕРЕВЯННАЯ РАМКА С ПАСПАРТУ === */
          .picture-frame {
              width: 70%; height: 70%;
              background: #fdfdfd; 
              padding: 3%; 
              border: 8px solid #2b1d14; /* Темное дерево */
              border-radius: 2px;
              box-shadow: 20px 30px 50px rgba(0,0,0,0.9), inset 0 0 15px rgba(0,0,0,0.2); 
              display: flex; align-items: center; justify-content: center;
              position: relative;
          }

          /* === САМА ФОТОГРАФИЯ === */
          .picture-frame img { 
              max-width: 100%; max-height: 100%; object-fit: contain; 
              box-shadow: inset 0 0 10px rgba(0,0,0,0.5); 
          }

          .face[data-face="front"] { transform: translateZ(calc(var(--s) / 2)); }
          .face[data-face="back"] { transform: rotateY(180deg) translateZ(calc(var(--s) / 2)); }
          .face[data-face="right"] { transform: rotateY(90deg) translateZ(calc(var(--s) / 2)); }
          .face[data-face="left"] { transform: rotateY(-90deg) translateZ(calc(var(--s) / 2)); }
          .face[data-face="top"] { transform: rotateX(-90deg) translateZ(calc(var(--s) / 2)); }
          .face[data-face="bottom"] { transform: rotateX(90deg) translateZ(calc(var(--s) / 2)); }
        }

        @layer ui {
          #hud { position: fixed; top: var(--ui-inset); right: var(--ui-inset); z-index: var(--z-ui); text-align: right; font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
          .progress-bar { width: 7.5rem; height: var(--hairline); background: var(--muted); margin-block-start: 0.5rem; margin-inline-start: auto; position: relative; overflow: hidden; }
          .progress-fill { position: absolute; inset-block: 0; inset-inline-start: 0; width: 0%; background: var(--accent); transition: width 0.1s linear; }
          .scene-label { font-size: 0.6rem; color: var(--accent); margin-block-start: 0.4rem; }
          
          /* КНОПКИ ВПЕРЕД / НАЗАД */
          .nav-arrow {
              position: fixed; top: 50%; transform: translateY(-50%); z-index: 100;
              background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--accent);
              width: 50px; height: 50px; border-radius: 50%; font-size: 20px;
              cursor: pointer; display: flex; align-items: center; justify-content: center;
              transition: 0.3s; backdrop-filter: blur(5px);
          }
          .nav-arrow:hover { background: var(--accent); transform: translateY(-50%) scale(1.1); box-shadow: 0 0 20px var(--accent); }
          #btn_prev { left: var(--nav-x); } 
          #btn_next { right: var(--nav-x); }

          #face_caption { position: fixed; bottom: var(--ui-inset); left: 50%; translate: -50% 0; z-index: var(--z-ui); text-align: center; pointer-events: none; user-select: none; }
          #face_caption_num { font-size: 0.58rem; letter-spacing: 0.28em; color: var(--accent); text-transform: uppercase; margin-block-end: 0.15rem; }
          #face_caption_name { font-family: var(--font-display); font-size: clamp(1.8rem, 5vw, 3.5rem); letter-spacing: 0.08em; color: var(--muted); opacity: 0.5; line-height: 1; text-transform: uppercase;}
          
          #back_btn { position: fixed; top: 2rem; left: var(--nav-x); z-index: 100; color: var(--muted); text-decoration: none; font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; border: var(--hairline) solid color-mix(in srgb, var(--muted) 45%, transparent); padding: 0.6rem 1.25rem; transition: 0.3s; }
          #back_btn:hover { color: var(--fg); border-color: var(--muted); background: color-mix(in srgb, var(--muted) 12%, transparent); }
        }

        @layer cards {
          /* ОРИГИНАЛЬНЫЕ КАРТОЧКИ ТЕКСТА */
          .text-card {
            max-width: 23.75rem; /* Ограничитель ширины, чтобы не перекрывать центр */
            padding: 2.25rem 2rem;
            background: var(--card-bg);
            border-left: var(--hairline) solid var(--card-border);
            backdrop-filter: blur(6px) saturate(120%);
            -webkit-backdrop-filter: blur(6px) saturate(120%);
            overflow: hidden;
            transition: background 0.3s ease, border-color 0.3s ease;
            pointer-events: auto; /* Чтобы можно было выделить текст */
          }

          .text-card.right {
            margin-inline-start: auto;
            border-left: none;
            border-right: var(--hairline) solid var(--card-border);
            text-align: right;
          }
          .text-card.right .h-line { transform-origin: right; margin-inline-start: auto; }

          .tag { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-block-end: 1.1rem; }
          :where(h1, h2) { font-family: var(--font-display); font-weight: 400; letter-spacing: 0.03em; line-height: 0.92; }
          h1 { font-size: clamp(3rem, 8vw, 6.5rem); }
          h2 { font-size: clamp(2.2rem, 5vw, 4rem); text-transform: uppercase;}
          .body-text { font-size: 0.78rem; line-height: 1.8; color: color-mix(in srgb, var(--fg) 80%, transparent); margin-block-start: 1.25rem; font-style: italic;}
          
          .h-line { width: 3.125rem; height: var(--hairline); background: var(--accent); margin-block-end: 1.2rem; transform-origin: left; }
          
          .author { display: block; margin-top: 15px; font-weight: bold; color: var(--accent); font-style: normal; font-size: 0.7rem; text-transform: uppercase;}
        }

        @layer reveal {
          :is(.tag, h1, h2, .body-text, .cta, .cta-back, .author) { opacity: 0; translate: 0 var(--reveal-offset); }
          :is(h1, h2) { translate: 0 1.125rem; transition: opacity var(--reveal-duration) ease 0.08s, translate var(--reveal-duration) ease 0.08s; }
          .tag { transition: opacity var(--reveal-duration) ease, translate var(--reveal-duration) ease; }
          .body-text, .author { transition: opacity var(--reveal-duration) ease 0.2s, translate var(--reveal-duration) ease 0.2s; }
          .h-line { opacity: 0; scale: 0 1; transition: opacity 0.4s ease, scale 0.4s ease; }
          
          :is(.tag, h1, h2, .body-text, .author).visible { opacity: 1; translate: 0 0; }
          .h-line.visible { opacity: 1; scale: 1 1; }
        }

        @media (max-width: 1024px) {
            #ambient_glow { width: 100vw; height: 100vw; }
            #cube { --s: min(80vw, 80vh, 400px); margin-top: -20vh;}
            section { align-items: flex-end; padding: 0 1.5rem 3.5rem; min-height: 150vh;}
            #s0 { min-height: 100vh; align-items: center; padding: 4rem 1.5rem; }
            .text-card, .text-card.right { max-width: 100%; padding: 1.5rem 1.25rem; }
            .nav-arrow { display: none; } /* Скрываем стрелки на мобильном, там свайп/скролл */
            #back_btn { top: 1rem; left: 1rem; }
            #hud { top: 1rem; right: 1rem; }
        }
    </style>
</head>
<body>

    <div id="ambient_glow"></div>
    <a href="index.html" id="back_btn">← НА ГЛАВНУЮ</a>

    <button class="nav-arrow" id="btn_prev">❮</button>
    <button class="nav-arrow" id="btn_next">❯</button>

    <div id="scene">
        <div id="cube">
            <!-- 6 физических граней куба -->
            <div class="face" data-face="top"></div>
            <div class="face" data-face="front"></div>
            <div class="face" data-face="right"></div>
            <div class="face" data-face="back"></div>
            <div class="face" data-face="left"></div>
            <div class="face" data-face="bottom"></div>
        </div>
    </div>

    <div id="hud">
        <div id="hud_pct">000%</div>
        <div class="progress-bar"><div class="progress-fill" id="prog_fill"></div></div>
        <div class="scene-label" id="scene_name">ГАЛЕРЕЯ</div>
    </div>

    <div id="face_caption">
        <div id="face_caption_num">01</div>
        <div id="face_caption_name">ВВЕДЕНИЕ</div>
    </div>

    <div id="scroll_container">
        <!-- Секции будут добавлены скриптом -->
    </div>

    <script>
        const USERNAME = 'gevartplay';
        const REPO = 'gevartplay.github.io';
        
        const QUOTES = [
            { text: "«Фотография — это секрет о секрете. Чем больше она говорит вам, тем меньше вы знаете.»", author: "Диана Арбус" },
            { text: "«Вы не фотографируете, вы создаете. Вы вкладываете в снимок все картины, которые когда-либо видели.»", author: "Ансель Адамс" },
            { text: "«Искусство — это ложь, которая делает нас способными осознать правду.»", author: "Пабло Пикассо" },
            { text: "«Камера — это инструмент, который учит людей, как видеть мир без камеры.»", author: "Доротея Ланж" },
            { text: "«То, что вы ловите на пленку, запечатлевается навсегда. Она помнит мелочи, которые вы давно забыли.»", author: "Аарон Сискинд" },
            { text: "«Фотография оставляет открытыми мгновения, которые сразу же перекрываются напором времени.»", author: "Морис Мерло-Понти" },
            { text: "«Смотреть — значит забыть названия вещей, на которые ты смотришь.»", author: "Пол Валери" },
            { text: "«Свет прославляет всё. Он превращает мусор в золото.»", author: "Уинстон Линк" },
            { text: "«Мы видим не вещи, а то, как на них падает свет.»", author: "Карл Юнг" },
            { text: "«В фотографии нет теней, которые нельзя было бы осветить.»", author: "Август Зандер" }
        ];

        let portfolioImages = [];
        let sectionTops = [];
        let maxScroll = 1;
        let smoothScroll = 0;
        let targetScroll = 0;

        const dom = {
            cube: document.getElementById("cube"),
            scrollEl: document.getElementById("scroll_container"),
            hudPct: document.getElementById("hud_pct"),
            progFill: document.getElementById("prog_fill"),
            sceneName: document.getElementById("scene_name"),
            captionNum: document.getElementById("face_caption_num"),
            captionName: document.getElementById("face_caption_name"),
            btnPrev: document.getElementById("btn_prev"),
            btnNext: document.getElementById("btn_next")
        };

        // ОРИГИНАЛЬНАЯ МАТЕМАТИКА (чтобы фото не были вверх ногами)
        function buildStops(n) {
            const base = [
                { rx: 90, ry: 0 },   // Top
                { rx: 0, ry: 0 },    // Front
                { rx: 0, ry: -90 },  // Right
                { rx: 0, ry: -180 }, // Back
                { rx: 0, ry: -270 }, // Left
                { rx: -90, ry: -360 }// Bottom
            ];
            const out = base.slice(0, Math.min(n, 6));
            for (let i = 6; i < n; i++) {
                // После 6-й грани крутимся просто по горизонтали, чтобы не ломать оси
                out.push({ rx: 0, ry: -360 - (i - 5) * 90 }); 
            }
            return out;
        }

        // Определение, какая грань сейчас смотрит на нас
        function faceAtStop(i) {
            if (i === 0) return 'top';
            if (i === 1) return 'front';
            if (i === 2) return 'right';
            if (i === 3) return 'back';
            if (i === 4) return 'left';
            if (i === 5) return 'bottom';
            const sides = ['front', 'right', 'back', 'left'];
            return sides[(i - 1) % 4];
        }

        let STOPS = [];

        async function loadImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/images`);
                const files = await response.json();
                portfolioImages = files.filter(file => 
                    file.name.match(/\.(jpg|jpeg|png)$/i) && 
                    !file.name.includes('logo.png') && 
                    !file.name.includes('avatar.jpg') &&
                    !file.name.includes('ikon.png')
                );
                const getTimestamp = (name) => { const match = name.match(/img_(\d+)_/); return match ? parseInt(match[1]) : 0; };
                portfolioImages.sort((a, b) => getTimestamp(b.name) - getTimestamp(a.name));
            } catch (e) {
                console.error("Ошибка API. Включаю резервные фото.");
                portfolioImages = [
                    { download_url: "images/imgi_3_964ff10fab66bfd241a5c7ce2452d701.jpg" },
                    { download_url: "images/imgi_5_1362ba95d769a188f22cec6d95d52685.jpg" },
                    { download_url: "images/imgi_9_d2b9af8f4167ac9c9c065d864be3ab83.jpg" },
                    { download_url: "images/photo_2026-01-21_18-52-52.jpg" },
                    { download_url: "images/avatar.jpg" },
                    { download_url: "images/imgi_3_964ff10fab66bfd241a5c7ce2452d701.jpg" }
                ];
            }

            if(portfolioImages.length > 0) {
                STOPS = buildStops(portfolioImages.length);
                buildSections();
            }
        }

        function buildSections() {
            let html = `
            <section id="s0">
                <div class="text-card">
                    <div class="h-line"></div>
                    <div class="tag">GevArtPlay 3D Галерея</div>
                    <h1>ИСКУССТВО<br>ВИДЕТЬ</h1>
                    <p class="body-text">Добро пожаловать в виртуальный выставочный зал. Каждая фотография здесь — это застывшая мысль.</p>
                </div>
            </section>`;

            for(let i = 1; i < portfolioImages.length; i++) {
                const quote = QUOTES[i % QUOTES.length];
                const alignmentClass = (i % 2 !== 0) ? 'right' : ''; 
                html += `
                <section id="s${i}">
                    <div class="text-card ${alignmentClass}">
                        <div class="h-line"></div>
                        <div class="tag">ЭКСПОНАТ ${String(i).padStart(2, '0')}</div>
                        <h2>ЭКСПРЕССИЯ</h2>
                        <p class="body-text">${quote.text}</p>
                        <span class="author">— ${quote.author}</span>
                    </div>
                </section>`;
            }

            dom.scrollEl.innerHTML = html;
            
            const revealEls = document.querySelectorAll(".tag, h1, h2, .body-text, .author, .h-line");
            const io = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); } });
            }, { threshold: 0.2 });
            revealEls.forEach(el => io.observe(el));

            setTimeout(() => { recalcScroll(); init3DScroll(); }, 500);
        }

        function updateFaceImage(stopIndex, imageIndex) {
            if (imageIndex < 0 || imageIndex >= portfolioImages.length) return;
            const src = portfolioImages[imageIndex].download_url;
            
            const faceName = faceAtStop(stopIndex);
            const faceElem = document.querySelector(`.face[data-face="${faceName}"]`);
            if(!faceElem) return;

            if(faceElem.children.length === 0) {
                const frame = document.createElement('div');
                frame.className = 'picture-frame';
                const img = new Image();
                img.src = src;
                frame.appendChild(img);
                faceElem.appendChild(frame);
            } else {
                const img = faceElem.querySelector('img');
                if(img.src !== src) img.src = src;
            }
        }

        function recalcScroll() {
            maxScroll = Math.max(1, document.documentElement.scrollHeight - innerHeight);
            const sections = document.querySelectorAll("section");
            sectionTops = Array.from(sections).map(s => s.getBoundingClientRect().top + window.scrollY);
        }

        window.addEventListener("resize", recalcScroll);

        function scrollToSection(index) {
            if(index < 0 || index >= portfolioImages.length) return;
            window.scrollTo({ top: sectionTops[index], behavior: 'smooth' });
        }
        
        dom.btnPrev.addEventListener('click', () => {
            let currentIndex = Math.round(smoothScroll * (portfolioImages.length - 1));
            scrollToSection(currentIndex - 1);
        });
        
        dom.btnNext.addEventListener('click', () => {
            let currentIndex = Math.round(smoothScroll * (portfolioImages.length - 1));
            scrollToSection(currentIndex + 1);
        });

        const easeIO = (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t);

        let currentActiveIndex = -1;
        
        function init3DScroll() {
            window.addEventListener("scroll", () => { targetScroll = scrollY / maxScroll; }, { passive: true });

            const frame = () => {
                requestAnimationFrame(frame);
                smoothScroll += (targetScroll - smoothScroll) * 0.08;
                
                const p = Math.round(smoothScroll * 100);
                dom.hudPct.textContent = String(p).padStart(3, "0") + "%";
                dom.progFill.style.width = `${p}%`;

                const N = portfolioImages.length;
                if(N < 2) return;

                const t = smoothScroll * (N - 1);
                const i = Math.min(Math.floor(t), N - 2);
                const f = easeIO(t - i); 
                
                const a = STOPS[i];
                const b = STOPS[i + 1];
                
                const rx = a.rx + (b.rx - a.rx) * f;
                const ry = a.ry + (b.ry - a.ry) * f;
                dom.cube.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;

                let activeIndex = Math.round(t);
                if (activeIndex !== currentActiveIndex) {
                    currentActiveIndex = activeIndex;
                    
                    const title = activeIndex === 0 ? "ВВЕДЕНИЕ" : "ЭКСПРЕССИЯ";
                    dom.sceneName.textContent = title;
                    dom.captionNum.textContent = String(activeIndex + 1).padStart(2, "0");
                    dom.captionName.textContent = title;
                    
                    // Обновление фото на гранях
                    updateFaceImage(activeIndex, activeIndex);
                    if(activeIndex + 1 < N) updateFaceImage(activeIndex + 1, activeIndex + 1);
                    if(activeIndex - 1 >= 0) updateFaceImage(activeIndex - 1, activeIndex - 1);
                }
            };
            requestAnimationFrame(frame);
        }

        loadImages();
    </script>
</body>
</html>
