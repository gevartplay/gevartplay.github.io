<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GevArtPlay | 3D Галерея</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        @layer reset, tokens, base, layout, cube, ui, cards, reveal, theme, responsive;

        @layer reset { *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } }

        @layer tokens {
          :root {
            color-scheme: dark;
            --dark-bg: #050505; --dark-fg: #ede8df; --dark-muted: #8a7b6e;
            --light-bg: #e6e0d4; --light-fg: #0d0d14; --light-muted: #666;
            --accent-dark: #5b51d8;
            --accent-light: #5b51d8;
            --bg: var(--dark-bg); --fg: var(--dark-fg); --muted: var(--dark-muted); --accent: var(--accent-dark);
            --font-display: "Bebas Neue", sans-serif; --font-mono: "Montserrat", sans-serif;
            --hairline: 0.0625rem; --ui-inset: 2rem; 
            --card-bg: rgba(5, 5, 5, 0.7); /* Прозрачный фон текста */
            --nav-x: calc(var(--ui-inset) + 0.125rem); --reveal-offset: 0.625rem; --reveal-duration: 0.5s; --z-ui: 10;
          }
        }

        @layer base {
          body { background: var(--bg); color: var(--fg); font-family: var(--font-mono); overflow-x: hidden; transition: background 0.3s ease, color 0.3s ease; }
          /* Кастомный скроллбар */
          ::-webkit-scrollbar { width: 8px; }
          ::-webkit-scrollbar-track { background: var(--bg); }
          ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        }

        @layer layout {
          #scene { position: fixed; inset: 0; z-index: 0; display: flex; align-items: center; justify-content: center; perspective: 1200px; pointer-events: none; }
          #scroll_container { position: relative; z-index: 1; }
          section { min-height: 100vh; display: flex; align-items: center; padding: 6rem 5rem; }
        }

        @layer cube {
          #cube { --s: min(70vw, 70vh, 500px); width: var(--s); height: var(--s); position: relative; transform-style: preserve-3d; transform: rotateX(0deg) rotateY(0deg); will-change: transform; }
          
          /* === СТЕНА === */
          .face { 
              position: absolute; inset: 0; backface-visibility: hidden; 
              background: #111; /* Темная стена */
              border: 1px solid #222; /* Легкий контур куба */
              box-shadow: inset 0 0 100px rgba(0,0,0,0.9); /* Затенение по углам стены */
              display: flex; align-items: center; justify-content: center;
          }
          
          /* === РАМКА ДЛЯ ФОТО === */
          .picture-frame {
              width: 75%; height: 75%;
              background: #fff; /* Белое паспарту */
              padding: 15px; 
              border: 10px solid #c29562; /* Деревянная рамка */
              box-shadow: 15px 25px 40px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.3); /* Тень от рамки на стене */
              display: flex; align-items: center; justify-content: center;
          }

          /* === САМА ФОТОГРАФИЯ === */
          .picture-frame img { 
              max-width: 100%; max-height: 100%; object-fit: contain; 
              box-shadow: inset 0 0 10px rgba(0,0,0,0.5); /* Внутренняя тень на фото */
          }

          .face[data-face="front"] { transform: translateZ(calc(var(--s) / 2)); }
          .face[data-face="right"] { transform: rotateY(90deg) translateZ(calc(var(--s) / 2)); }
          .face[data-face="back"] { transform: rotateY(180deg) translateZ(calc(var(--s) / 2)); }
          .face[data-face="left"] { transform: rotateY(-90deg) translateZ(calc(var(--s) / 2)); }
          .face[data-face="top"] { transform: rotateX(-90deg) translateZ(calc(var(--s) / 2)); background: #080808;}
          .face[data-face="bottom"] { transform: rotateX(90deg) translateZ(calc(var(--s) / 2)); background: #080808; box-shadow: 0 0 100px var(--accent);} /* Подсветка снизу */
        }

        @layer ui {
          #back_btn { position: fixed; top: 2rem; left: 2rem; z-index: 100; color: white; text-decoration: none; font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 2px; transition: 0.3s; padding: 10px 20px; border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; backdrop-filter: blur(5px);}
          #back_btn:hover { color: #fff; background: var(--accent); border-color: var(--accent); }
          #hud { position: fixed; top: var(--ui-inset); right: var(--ui-inset); z-index: var(--z-ui); text-align: right; font-size: 0.8rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
          .progress-bar { width: 7.5rem; height: 2px; background: #333; margin-block-start: 0.5rem; margin-inline-start: auto; position: relative; overflow: hidden; }
          .progress-fill { position: absolute; inset-block: 0; inset-inline-start: 0; width: 0%; background: var(--accent); transition: width 0.1s linear; }
          .scene-label { font-size: 0.8rem; color: var(--accent); margin-block-start: 0.4rem; font-weight: bold;}
          
          #loading_screen { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; align-items: center; justify-content: center; color: var(--accent); font-family: 'Bebas Neue'; font-size: 3rem; letter-spacing: 5px; transition: opacity 1s; }
        }

        @layer cards {
          /* Исправление наложения: ограничиваем ширину текста и прижимаем к краям */
          .text-card { 
              width: 32vw; /* Занимает только треть экрана */
              min-width: 300px;
              padding: 2.5rem; 
              background: var(--card-bg); 
              border-left: 3px solid var(--accent); 
              backdrop-filter: blur(10px); 
              box-shadow: 0 10px 30px rgba(0,0,0,0.5);
          }
          
          .text-card.right { 
              margin-left: auto; /* Прижимает вправо */
              border-left: none; 
              border-right: 3px solid var(--accent); 
              text-align: right; 
          }
          
          .tag { font-size: 0.8rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-block-end: 1rem; font-weight: 500;}
          h1, h2 { font-family: 'Oswald', sans-serif; font-weight: 700; letter-spacing: 0.05em; line-height: 1.1; text-transform: uppercase;}
          h1 { font-size: clamp(3rem, 5vw, 4.5rem); margin-bottom: 20px;} 
          h2 { font-size: clamp(2rem, 3.5vw, 3.5rem); margin-bottom: 20px;}
          .body-text { font-size: 0.95rem; line-height: 1.8; color: #ddd; font-style: italic; font-weight: 300;}
          .author { display: block; margin-top: 15px; font-weight: 500; color: var(--accent); font-style: normal; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase;}
        }

        @layer reveal {
          .reveal-el { opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
          .reveal-el.visible { opacity: 1; transform: translateY(0); }
        }

        @layer theme {
          :root[data-theme="light"] { --bg: var(--light-bg); --fg: var(--light-fg); --muted: var(--light-muted); --accent: var(--accent-light); --card-bg: rgba(230, 224, 212, 0.85); }
          :root[data-theme="light"] .face { background: #dfd8c8; border-color: #ccc; box-shadow: inset 0 0 50px rgba(0,0,0,0.1); }
          :root[data-theme="light"] .face[data-face="top"], :root[data-theme="light"] .face[data-face="bottom"] { background: #d0c8b8; }
          :root[data-theme="light"] .body-text { color: #333; }
        }

        @media (max-width: 1024px) {
            #scene_strip { display: none; }
            section { padding: 4rem 2rem; align-items: flex-end; }
            /* На мобилках куб выше, а текст в самом низу на всю ширину */
            #cube { transform: translateY(-15vh); }
            .text-card, .text-card.right { 
                width: 100%; max-width: 100%; margin: 0; padding: 1.5rem; 
                background: rgba(5,5,5,0.9); text-align: center; border: none; border-top: 3px solid var(--accent);
            }
            #hud { top: 1rem; right: 1rem; }
            #back_btn { top: 1rem; left: 1rem; font-size: 1rem; padding: 5px 15px;}
        }
    </style>
</head>
<body>

    <div id="loading_screen">СОЗДАНИЕ ГАЛЕРЕИ...</div>

    <a href="index.html" id="back_btn">← НА ГЛАВНУЮ</a>

    <div id="scene">
        <div id="cube">
            <div class="face" data-face="top" data-i="4"></div>
            <div class="face" data-face="front" data-i="0"></div>
            <div class="face" data-face="right" data-i="1"></div>
            <div class="face" data-face="back" data-i="2"></div>
            <div class="face" data-face="left" data-i="3"></div>
            <div class="face" data-face="bottom" data-i="5"></div>
        </div>
    </div>

    <div id="hud">
        <div id="hud_pct">000%</div>
        <div class="progress-bar"><div class="progress-fill" id="prog_fill"></div></div>
        <div class="scene-label" id="scene_name">ВВЕДЕНИЕ</div>
    </div>

    <div id="scroll_container">
        <!-- Сюда динамически добавятся секции скриптом -->
    </div>

    <script>
        const USERNAME = 'gevartplay';
        const REPO = 'gevartplay.github.io';
        
        // Цитаты для фотографий
        const QUOTES = [
            { text: "«Фотография — это секрет о секрете. Чем больше она говорит вам, тем меньше вы знаете.»", author: "Диана Арбус" },
            { text: "«Вы не фотографируете, вы создаете. Вы вкладываете в снимок все картины, которые когда-либо видели.»", author: "Ансель Адамс" },
            { text: "«Искусство — это ложь, которая делает нас способными осознать правду.»", author: "Пабло Пикассо" },
            { text: "«Камера — это инструмент, который учит людей, как видеть мир без камеры.»", author: "Доротея Ланж" },
            { text: "«То, что вы ловите на пленку, запечатлевается навсегда. Она помнит мелочи, которые вы давно забыли.»", author: "Аарон Сискинд" },
            { text: "«Фотография оставляет открытыми мгновения, которые сразу же перекрываются напором времени.»", author: "Морис Мерло-Понти" },
            { text: "«Каждая фотография — это сертификат присутствия.»", author: "Ролан Барт" },
            { text: "«Смотреть — значит забыть названия вещей, на которые ты смотришь.»", author: "Пол Валери" },
            { text: "«Свет прославляет всё. Он превращает мусор в золото.»", author: "Уинстон Линк" },
            { text: "«Хорошая фотография — это та, которая передает факт, затрагивает сердце и оставляет зрителя изменившимся.»", author: "Ирвинг Пенн" },
            { text: "«Если ваши снимки недостаточно хороши, значит, вы находитесь недостаточно близко.»", author: "Роберт Капа" },
            { text: "«Мы видим не вещи, а то, как на них падает свет.»", author: "Карл Юнг" },
            { text: "«Снимать — значит в одну долю секунды распознать факт и строгую организацию форм.»", author: "Анри Картье-Брессон" },
            { text: "«В фотографии нет теней, которые нельзя было бы осветить.»", author: "Август Зандер" },
            { text: "«Фотография — это картина, написанная солнцем без участия художника.»", author: "Амброз Бирс" }
        ];

        let portfolioImages = [];
        let sectionTops = [];
        let maxScroll = 1;
        const dom = {
            cube: document.getElementById("cube"),
            faces: [...document.querySelectorAll(".face")],
            scrollEl: document.getElementById("scroll_container"),
            hudPct: document.getElementById("hud_pct"),
            progFill: document.getElementById("prog_fill"),
            sceneName: document.getElementById("scene_name"),
            loading: document.getElementById("loading_screen")
        };

        // Загрузка фото из репозитория
        async function loadImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/images`);
                const files = await response.json();
                portfolioImages = files.filter(file => 
                    file.name.match(/\.(jpg|jpeg|png)$/i) && 
                    !file.name.includes('logo.png') && 
                    !file.name.includes('avatar.jpg') &&
                    !file.name.includes('ikon.png')
                );
                
                // Сортировка как на главной
                const getTimestamp = (name) => { const match = name.match(/img_(\d+)_/); return match ? parseInt(match[1]) : 0; };
                portfolioImages.sort((a, b) => getTimestamp(b.name) - getTimestamp(a.name));
            } catch (e) {
                console.error("Ошибка загрузки. Используем демо-данные.", e);
                portfolioImages = [
                    { download_url: "images/imgi_3_964ff10fab66bfd241a5c7ce2452d701.jpg" },
                    { download_url: "images/imgi_5_1362ba95d769a188f22cec6d95d52685.jpg" },
                    { download_url: "images/imgi_9_d2b9af8f4167ac9c9c065d864be3ab83.jpg" }
                ];
            }

            if(portfolioImages.length > 0) {
                buildSections();
                dom.loading.style.opacity = '0';
                setTimeout(() => dom.loading.style.display = 'none', 1000);
            }
        }

        // Построение секций текста на основе количества фото
        function buildSections() {
            let html = `
            <section id="s0">
                <div class="text-card reveal-el">
                    <div class="tag">GevArtPlay 3D Галерея</div>
                    <h1>ИСКУССТВО<br>ВИДЕТЬ</h1>
                    <p class="body-text">Добро пожаловать в виртуальный выставочный зал. Каждая фотография здесь — это застывшая мысль.<br><br>Скролльте вниз, чтобы вращать пространство.</p>
                </div>
            </section>`;

            portfolioImages.forEach((img, i) => {
                const quote = QUOTES[i % QUOTES.length];
                const alignmentClass = (i % 2 !== 0) ? 'right' : ''; // Чередование лево/право
                
                html += `
                <section id="s${i+1}">
                    <div class="text-card ${alignmentClass} reveal-el">
                        <div class="tag">ОБЪЕКТ ${String(i+1).padStart(2, '0')}</div>
                        <h2>ЭКСПРЕССИЯ</h2>
                        <p class="body-text">${quote.text}</p>
                        <span class="author">— ${quote.author}</span>
                    </div>
                </section>`;
            });

            dom.scrollEl.innerHTML = html;
            
            // Настройка IntersectionObserver для анимации текста
            const revealEls = document.querySelectorAll(".reveal-el");
            const io = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible"); });
            }, { threshold: 0.2 });
            revealEls.forEach(el => io.observe(el));

            recalcScroll();
            init3DScroll();
        }

        // Обновление фото на конкретной грани куба (0=Front, 1=Right, 2=Back, 3=Left)
        function updateFaceImage(faceIndex, imageIndex) {
            if (imageIndex < 0 || imageIndex >= portfolioImages.length) return;
            const src = portfolioImages[imageIndex].download_url;
            
            // Находим грань (data-face: front, right, back, left)
            const sideFaces = ['front', 'right', 'back', 'left'];
            const faceElem = document.querySelector(`.face[data-face="${sideFaces[faceIndex]}"]`);
            if(!faceElem) return;

            // Если рамки еще нет, создаем её
            if(faceElem.children.length === 0) {
                const frame = document.createElement('div');
                frame.className = 'picture-frame';
                const img = new Image();
                img.src = src;
                frame.appendChild(img);
                faceElem.appendChild(frame);
            } else {
                // Если есть, просто меняем src
                const img = faceElem.querySelector('img');
                if(img.src !== src) img.src = src;
            }
        }

        function recalcScroll() {
            maxScroll = Math.max(1, document.documentElement.scrollHeight - innerHeight);
            const sections = document.querySelectorAll("section");
            sectionTops = Array.from(sections).map(s => s.getBoundingClientRect().top + window.scrollY);
        }

        window.addEventListener("resize", recalcScroll);

        let currentImageIndex = -1;
        
        function init3DScroll() {
            let tgt = 0, smooth = 0;
            window.addEventListener("scroll", () => { tgt = scrollY / maxScroll; }, { passive: true });

            const frame = () => {
                requestAnimationFrame(frame);
                smooth += (tgt - smooth) * 0.08;
                
                // Прогресс бар
                const p = Math.round(smooth * 100);
                dom.hudPct.textContent = String(p).padStart(3, "0") + "%";
                dom.progFill.style.width = `${p}%`;

                // Количество этапов = количество фото
                const N = portfolioImages.length;
                if(N === 0) return;

                // Вычисляем текущий индекс (сцена)
                const t = smooth * N;
                let activeIndex = Math.max(0, Math.min(Math.floor(t), N - 1));
                
                // Вращение куба (горизонтальное)
                const rotationY = -(smooth * N * 90);
                dom.cube.style.transform = `rotateY(${rotationY}deg)`;

                // Логика подмены фотографий на невидимых гранях
                if (activeIndex !== currentImageIndex) {
                    currentImageIndex = activeIndex;
                    dom.sceneName.textContent = "ФОТО " + String(activeIndex + 1).padStart(2, '0');
                    
                    // Обновляем текущую грань
                    updateFaceImage(activeIndex % 4, activeIndex);
                    // Предзагружаем на следующую грань следующее фото
                    if(activeIndex + 1 < N) updateFaceImage((activeIndex + 1) % 4, activeIndex + 1);
                    // Оставляем предыдущее фото сзади для плавности скролла назад
                    if(activeIndex - 1 >= 0) updateFaceImage((activeIndex - 1) % 4, activeIndex - 1);
                }
            };
            requestAnimationFrame(frame);
        }

        // Запуск
        loadImages();

    </script>
</body>
</html>
