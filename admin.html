<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | GevArtPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; position: relative; }
        h1 { font-family: 'Oswald', sans-serif; color: #5b51d8; letter-spacing: 2px; margin-top: 40px; }

        .back-btn { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #aaa; font-family: 'Oswald', sans-serif; font-size: 14px; border: 1px solid #333; padding: 10px 20px; border-radius: 30px; transition: 0.3s; background: rgba(255,255,255,0.05); }
        .back-btn:hover { color: white; border-color: #5b51d8; background: #5b51d8; }

        .box { background: #111; padding: 30px; border-radius: 10px; border: 1px solid #333; text-align: center; width: 100%; max-width: 500px; margin-bottom: 20px; }
        input, select { width: 90%; padding: 10px; margin-bottom: 20px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }

        button { background: #5b51d8; color: white; border: none; padding: 12px 30px; width: 100%; font-family: 'Oswald', sans-serif; font-size: 1.2rem; cursor: pointer; transition: 0.3s; border-radius: 5px; margin-bottom: 10px; }
        button:hover { background: #fff; color: #000; }

        .log-container { text-align: left; margin-top: 15px; max-height: 200px; overflow-y: auto; background: #000; padding: 10px; border-radius: 5px; border: 1px solid #333; }
        .log-item { font-size: 12px; margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .success { color: #00ff00; }
        .error { color: #ff4444; }

        .hidden { display: none; }
        .logout-link { color: #555; font-size: 12px; cursor: pointer; text-decoration: underline; margin-top: 20px; }

        /* Список видео в админке */
        .vid-row { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; font-size: 12px; }
        .vid-row .vid-info { text-align: left; flex: 1; overflow: hidden; }
        .vid-row .vid-info b { color: #5b51d8; }
        .vid-row img.thumb { width: 60px; height: 34px; object-fit: cover; border-radius: 4px; margin-right: 10px; }
        .vid-del { background: #330000; color: #ff4444; border: 1px solid #ff4444; padding: 6px 12px; width: auto; font-size: 12px; margin: 0 0 0 8px; }
        .vid-del:hover { background: #ff4444; color: white; }
        .cat-tag { display:inline-block; font-size:10px; padding:2px 8px; border-radius:10px; background:#222; color:#aaa; margin-left:6px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← НА САЙТ</a>

    <h1>ПАНЕЛЬ УПРАВЛЕНИЯ</h1>

    <div id="loginSection" class="box">
        <h3>АВТОРИЗАЦИЯ</h3>
        <input type="password" id="tokenInput" placeholder="ghp_...">
        <button onclick="saveTokenAndLogin()">ВОЙТИ</button>
    </div>

    <div id="mainSection" class="hidden">

        <div class="box">
            <h3>📸 ЗАГРУЗИТЬ ФОТО</h3>
            <p style="font-size: 12px; color: #aaa;">Совет: загружайте по 3-5 фото за раз.</p>
            <input type="file" id="fileInput" accept="image/*" multiple>
            <button onclick="uploadImages()">ЗАГРУЗИТЬ ФОТО</button>
            <div id="uploadLog" class="log-container hidden"></div>
        </div>

        <div class="box" style="border-color: #5b51d8;">
            <h3>🎬 ДОБАВИТЬ ВИДЕО</h3>
            <input type="text" id="videoUrl" placeholder="https://youtu.be/...">
            <select id="videoCategory">
                <option value="events">EVENTS</option>
                <option value="wedding">WEDDING</option>
                <option value="music">MUSIC</option>
                <option value="fashion">FASHION</option>
            </select>
            <button onclick="addVideo()">ДОБАВИТЬ ВИДЕО</button>
        </div>

        <div class="box" style="border-color: #333;">
            <h3>📋 ВСЕ ВИДЕО</h3>
            <button onclick="loadVideoList()" style="background:#222;">🔄 ОБНОВИТЬ СПИСОК</button>
            <div id="videoList" style="margin-top:15px;"></div>
        </div>

        <p id="status"></p>
        <div class="logout-link" onclick="logout()">Выйти</div>
    </div>

    <script>
        const USERNAME = 'gevartplay';
        const REPO = 'gevartplay.github.io';
        const PHOTO_FOLDER = 'images';
        const VIDEO_FILE = 'videos.json';

        let userToken = '';
        let currentVideos = [];

        document.addEventListener("DOMContentLoaded", () => {
            const savedToken = localStorage.getItem('github_token_gevartplay');
            if (savedToken) { userToken = savedToken; unlockAdmin(); }
        });

        function saveTokenAndLogin() {
            const input = document.getElementById('tokenInput').value.trim();
            if (input.startsWith('ghp_') || input.startsWith('github_pat_')) {
                localStorage.setItem('github_token_gevartplay', input);
                userToken = input;
                unlockAdmin();
            } else alert('Токен должен начинаться на ghp_ или github_pat_');
        }

        function unlockAdmin() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            loadVideoList();
        }

        function logout() { localStorage.removeItem('github_token_gevartplay'); location.reload(); }

        // ==================== ФОТО ====================
        async function uploadImages() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;
            const logDiv = document.getElementById('uploadLog');

            if (files.length === 0) return alert("Выберите файлы!");

            logDiv.classList.remove('hidden');
            logDiv.innerHTML = "<div>Начинаю загрузку...</div>";

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const logItem = document.createElement('div');
                logItem.className = 'log-item';
                logItem.innerText = `⏳ ${file.name}...`;
                logDiv.appendChild(logItem);

                try {
                    const base64 = await readFileAsBase64(file);
                    const safeName = file.name.replace(/\s+/g, '_');
                    const uniqueName = 'img_' + Date.now() + '_' + i + '_' + safeName;

                    const res = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${PHOTO_FOLDER}/${uniqueName}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${userToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: `Upload photo`, content: base64 })
                    });

                    if (res.ok) {
                        logItem.innerHTML = `✅ ${file.name} - <b>OK</b>`;
                        logItem.classList.add('success');
                    } else {
                        logItem.innerHTML = `❌ ${file.name} - Ошибка GitHub`;
                        logItem.classList.add('error');
                    }
                } catch (e) {
                    console.error(e);
                    logItem.innerHTML = `❌ ${file.name} - Сбой`;
                    logItem.classList.add('error');
                }
            }

            const doneMsg = document.createElement('div');
            doneMsg.style.marginTop = "10px";
            doneMsg.innerText = "🏁 Готово! Обновите сайт через 1-2 минуты.";
            doneMsg.style.color = "white";
            logDiv.appendChild(doneMsg);

            fileInput.value = "";
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        // ==================== ВИДЕО ====================
        // ВСЕГДА читаем через API (свежая версия, не кэш Pages)
        async function getVideoFile() {
            const r = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${VIDEO_FILE}?ref=main&t=${Date.now()}`, {
                headers: {
                    'Authorization': `token ${userToken}`,
                    'Accept': 'application/vnd.github+json',
                    'Cache-Control': 'no-cache'
                }
            });

            if (r.status === 404) return { list: [], sha: null };
            if (!r.ok) throw new Error(`GitHub GET ${r.status}`);

            const data = await r.json();
            let list = [];
            try {
                list = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g, '')))));
            } catch (e) { list = []; }
            if (!Array.isArray(list)) list = [];
            return { list, sha: data.sha };
        }

        async function putVideoList(list, sha) {
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(list, null, 2))));
            const body = { message: "Update videos", content, branch: "main" };
            if (sha) body.sha = sha;

            return fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${VIDEO_FILE}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${userToken}`,
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });
        }

        // Универсальная безопасная запись с ретраями на 409
        async function saveVideoListSafe(transformFn) {
            let attempts = 0;
            while (attempts < 4) {
                attempts++;
                const fresh = await getVideoFile();
                const nextList = transformFn(fresh.list.slice());
                const r = await putVideoList(nextList, fresh.sha);
                if (r.ok) {
                    currentVideos = nextList;
                    return nextList;
                }
                if (r.status === 409) {
                    // конфликт SHA — повторяем со свежим файлом
                    await new Promise(res => setTimeout(res, 500));
                    continue;
                }
                const txt = await r.text();
                throw new Error(`GitHub PUT ${r.status}: ${txt}`);
            }
            throw new Error("Слишком много конфликтов (409). Попробуйте ещё раз.");
        }

        async function loadVideoList() {
            const listDiv = document.getElementById('videoList');
            listDiv.innerHTML = '<p style="color:#888">Загрузка...</p>';
            try {
                const fresh = await getVideoFile();
                currentVideos = fresh.list;
                renderVideoList();
            } catch (e) {
                console.error(e);
                listDiv.innerHTML = '<p style="color:#ff4444">Ошибка синхронизации</p>';
            }
        }

        function renderVideoList() {
            const listDiv = document.getElementById('videoList');
            // дедупликация по id для отображения
            const map = new Map();
            currentVideos.forEach(v => map.set(v.id, v));
            const uniq = Array.from(map.values()).sort((a, b) => (b.date || 0) - (a.date || 0));

            if (uniq.length === 0) {
                listDiv.innerHTML = '<p style="color:#888">Видео пока нет.</p>';
                return;
            }

            listDiv.innerHTML = `<p style="color:#00ff00;margin-bottom:10px;">Всего: ${uniq.length}</p>`;
            uniq.forEach(v => {
                const row = document.createElement('div');
                row.className = 'vid-row';
                row.innerHTML = `
                    <img class="thumb" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="">
                    <div class="vid-info">
                        <div><b>${v.id}</b><span class="cat-tag">${v.category}</span></div>
                    </div>
                    <button class="vid-del" onclick="deleteVideo('${v.id}')">🗑</button>
                `;
                listDiv.appendChild(row);
            });
        }

        function extractYouTubeId(url) {
            const patterns = [
                /youtu\.be\/([A-Za-z0-9_-]{11})/,
                /[?&]v=([A-Za-z0-9_-]{11})/,
                /youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/,
                /youtube\.com\/embed\/([A-Za-z0-9_-]{11})/,
                /youtube\.com\/live\/([A-Za-z0-9_-]{11})/
            ];
            for (const pattern of patterns) {
                const m = url.match(pattern);
                if (m) return m[1];
            }
            // если ввели просто ID
            if (/^[A-Za-z0-9_-]{11}$/.test(url)) return url;
            return null;
        }

        async function addVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            const category = document.getElementById('videoCategory').value;
            const videoId = extractYouTubeId(url);

            if (!videoId) return alert("Некорректная ссылка YouTube.");

            try {
                await saveVideoListSafe((list) => {
                    // убираем ВСЕ вхождения этого id (чтобы не было дублей), потом добавляем свежим
                    const cleaned = list.filter(v => v.id !== videoId);
                    cleaned.push({ id: videoId, category, date: Date.now() });
                    return cleaned;
                });
                document.getElementById('videoUrl').value = "";
                renderVideoList();
                alert("Видео сохранено ✅ Сайт обновится через 1-2 минуты.");
            } catch (e) {
                console.error(e);
                alert("Ошибка сохранения: " + e.message);
            }
        }

        async function deleteVideo(id) {
            if (!confirm("Удалить это видео?")) return;
            try {
                await saveVideoListSafe((list) => list.filter(v => v.id !== id));
                renderVideoList();
                alert("Видео удалено ✅ Сайт обновится через 1-2 минуты.");
            } catch (e) {
                console.error(e);
                alert("Ошибка удаления: " + e.message);
            }
        }

        // Синхронизация при возврате на вкладку
        window.addEventListener('focus', () => { if (userToken) loadVideoList(); });
        document.addEventListener('visibilitychange', () => { if (!document.hidden && userToken) loadVideoList(); });
    </script>
</body>
</html>
